<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Minerlytics</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logoMark" aria-hidden="true"></div>
      <span class="brandName">MINERLYTICS</span>
    </div>

    <nav class="navLinks">
      <a class="navLink" href="./index.html">Home</a>
      <a class="navLink" href="./company.html?ticker=AEM">Company Details</a>
      <a class="navLink" href="./analysis.html">Analysis</a>
      <a class="navLink" href="./educationportal.html">Education Portal</a>
      <a class="navLink" href="./subscription.html">Subscriptions</a>
      <a class="navLink" href="./about.html">About</a>
    </nav>

    <div class="navRight">
      <div id="authNav" style="display:flex;align-items:center;gap:10px;">
        <a class="btn btnGhost isActive" href="./login.html">Sign In</a>
        <a class="btn btnPrimary" href="./signup.html">Join Minerlytics</a>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero" style="min-height:75vh;display:grid;place-items:center;">
      <div class="artCard" style="max-width:480px;width:100%;padding:32px;">
        <div style="margin-bottom:22px;">
          <div class="brandName" style="font-size:13px;color:#d7c09a;margin-bottom:8px;">MINERLYTICS ACCOUNT</div>
          <h1 style="font-size:36px;margin:0 0 10px;">Welcome Back</h1>
          <p class="subhead" style="font-size:15px;margin:0;">
            Sign in to access your personalized Minerlytics dashboard.
          </p>
        </div>

        <div style="display:grid;gap:14px;">
          <input id="email" type="email" placeholder="Email"
            style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;" />

          <input id="password" type="password" placeholder="Password"
            style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;" />

          <button id="loginBtn" class="btn btnPrimary" type="button">Sign In</button>

          <p id="msg" style="color:#d7c09a;font-size:13px;min-height:18px;"></p>

          <p style="font-size:13px;color:var(--muted);">
            New to Minerlytics?
            <a href="./signup.html" style="color:#d7c09a;">Create an account</a>
          </p>

          <p style="font-size:13px;color:var(--muted);margin-top:-4px;">
            Already signed in?
            <a href="./change-password.html" style="color:#d7c09a;">Change your password</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/auth-ui.js"></script>
  <script>
    const API_BASE = "https://minerlytics-dev.lincbennette87.workers.dev";

    async function loadSignedInState() {
      const msg = document.getElementById("msg");

      try {
        const res = await fetch(API_BASE + "/api/me", {
          credentials: "include"
        });
        const data = await res.json();

        if (data.loggedIn) {
          window.MinerlyticsAuthUI?.setUserCache(data.user);
          msg.innerHTML = 'You are already signed in. <a href="./change-password.html" style="color:#d7c09a;">Change password</a> or return to <a href="./index.html" style="color:#d7c09a;">home</a>.';
        }
      } catch (err) {
        console.error("SESSION CHECK ERROR:", err);
      }
    }

    async function login() {
      const msg = document.getElementById("msg");
      const btn = document.getElementById("loginBtn");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      msg.textContent = "Signing in...";
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + "/api/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ email, password }),
          credentials: "include"
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          msg.textContent = data?.error || "Login failed.";
          btn.disabled = false;
          return;
        }

        window.MinerlyticsAuthUI?.setUserCache({
          email: data.email || email,
          first_name: data.first_name || "",
          last_name: data.last_name || "",
          display_name: data.display_name || ""
        });
        msg.textContent = "Logged in!";
        window.location.href = "./index.html";
      } catch (err) {
        console.error("LOGIN ERROR:", err);
        msg.textContent = "Network/API error. Please try again.";
        btn.disabled = false;
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter") login();
    });

    loadSignedInState();
  </script>
</body>
</html>
