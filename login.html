<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Minerlytics</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logoMark" aria-hidden="true"></div>
      <span class="brandName">MINERLYTICS</span>
    </div>

    <nav class="navLinks">
      <a class="navLink" href="./index.html">Home</a>
      <a class="navLink" href="./analysis.html">Analysis</a>
      <a class="navLink" href="./educationportal.html">Education Portal</a>
      <a class="navLink" href="./subscription.html">Subscriptions</a>
      <a class="navLink" href="./about.html">About</a>
    </nav>
  </header>

  <main class="shell">
    <section class="hero" style="min-height:70vh;display:grid;place-items:center;">
      <div class="artCard" style="max-width:460px;width:100%;padding:28px;">
        <h1 style="font-size:34px;margin-bottom:10px;">Welcome Back</h1>
        <p class="subhead" style="font-size:15px;margin-bottom:22px;">
          Sign in to your Minerlytics account for your personalized mining research dashboard.
        </p>

        <div style="display:grid;gap:14px;">
          <input id="email" type="email" placeholder="Email"
            style="padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#eaf0ff;" />

          <input id="password" type="password" placeholder="Password"
            style="padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#eaf0ff;" />

          <button class="btn btnPrimary" onclick="login()">Sign In</button>

          <p id="msg" style="color:#ffcc66;font-size:13px;"></p>

          <p style="font-size:13px;color:rgba(234,240,255,.7);">
            New to Minerlytics?
            <a href="./signup.html" style="color:#39e6c8;">Create an account</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script>
  async function login() {
    const msg = document.getElementById("msg");
    msg.textContent = "Signing in...";

    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (!data.ok) {
      msg.textContent = data.error || "Login failed";
      return;
    }

    window.location.href = "./index.html";
  }
  </script>
</body>
</html>
