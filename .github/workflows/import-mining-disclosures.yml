name: Import Mining Disclosures to Cloudflare D1

on:
  workflow_dispatch:

jobs:
  import-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Import all JSON files to Cloudflare endpoint
        env:
          IMPORT_URL: ${{ secrets.CF_IMPORT_URL }}
          IMPORT_KEY: ${{ secrets.CF_IMPORT_KEY }}
        run: |
          python3 - <<'PY'
          import os
          import json
          import glob
          import urllib.request
          import urllib.error

          files = sorted(glob.glob("public/data/mining_disclosure_reports/*.json"))
          print("Found", len(files), "files")

          if not files:
              raise Exception("No JSON files found in public/data/mining_disclosure_reports/")

          failed = []

          for path in files:
              print("Processing:", path)

              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)

              req = urllib.request.Request(
                  os.environ["IMPORT_URL"],
                  data=json.dumps(data).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "x-import-key": os.environ["IMPORT_KEY"],
                      "User-Agent": "GitHub-Minerlytics-Importer"
                  },
                  method="POST"
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read().decode("utf-8")
                      print("SUCCESS")
                      print(body)
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print("FAILED:", e.code)
                  print(body)
                  failed.append(path)
                  continue
              except Exception as e:
                  print("FAILED:", str(e))
                  failed.append(path)
                  continue

          print("----- IMPORT SUMMARY -----")
          print("Total files:", len(files))
          print("Failed files:", len(failed))

          if failed:
              print("Files that failed:")
              for f in failed:
                  print("-", f)
          PY
              req = urllib.request.Request(
                  os.environ["IMPORT_URL"],
                  data=json.dumps(data).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "x-import-key": os.environ["IMPORT_KEY"],
                      "User-Agent": "GitHub-Minerlytics-Importer"
                  },
                  method="POST"
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read().decode("utf-8")
                      print("SUCCESS")
                      print(body)
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print("FAILED:", e.code)
                  print(body)
                  raise
          PY
