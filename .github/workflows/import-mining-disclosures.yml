name: Import Mining Disclosures to D1

on:
  workflow_dispatch:

jobs:
  import-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Import one JSON file to Cloudflare endpoint
        env:
          IMPORT_URL: ${{ secrets.CF_IMPORT_URL }}
          IMPORT_KEY: ${{ secrets.CF_IMPORT_KEY }}
        run: |
          python3 - <<'PY'
          import os, json, glob, urllib.request, urllib.error

          files = sorted(glob.glob("public/data/mining_disclosure_reports/*.json"))
          print(f"Found {len(files)} files")
          print("IMPORT_URL =", os.environ["IMPORT_URL"])

          for path in files[:1]:
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)

              req = urllib.request.Request(
                  os.environ["IMPORT_URL"],
                  data=json.dumps(data).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "x-import-key": os.environ["IMPORT_KEY"],
                      "User-Agent": "GitHub-Actions-Minerlytics-Importer"
                  },
                  method="POST"
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read().decode("utf-8")
                      print("SUCCESS")
                      print(body)
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"FAILED: HTTP {e.code}")
                  print(body)
                  raise
          PY              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read().decode("utf-8")
                      print(f"OK {path}: {body[:300]}")
              except Exception as e:
                  print(f"FAILED {path}: {e}")
                  raise
          PY
