- name: Import one JSON file to Cloudflare endpoint
  env:
    IMPORT_URL: ${{ secrets.CF_IMPORT_URL }}
    IMPORT_KEY: ${{ secrets.CF_IMPORT_KEY }}
  run: |
    python3 - <<'PY'
import os
import json
import glob
import urllib.request
import urllib.error

files = sorted(glob.glob("public/data/mining_disclosure_reports/*.json"))
print("Found", len(files), "files")

for path in files[:1]:
    print("Processing:", path)

    with open(path, "r", encoding="utf-8") as f:
        data = json.load(f)

    req = urllib.request.Request(
        os.environ["IMPORT_URL"],
        data=json.dumps(data).encode("utf-8"),
        headers={
            "Content-Type": "application/json",
            "x-import-key": os.environ["IMPORT_KEY"],
            "User-Agent": "GitHub-Minerlytics-Importer"
        },
        method="POST"
    )

    try:
        with urllib.request.urlopen(req) as resp:
            body = resp.read().decode("utf-8")
            print("SUCCESS")
            print(body)
    except urllib.error.HTTPError as e:
        body = e.read().decode("utf-8", errors="replace")
        print("FAILED:", e.code)
        print(body)
        raise
PY
