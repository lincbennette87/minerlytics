name: Extract 10K From Disclosure Index

on:
  workflow_dispatch:
  push:
    paths:
      - "public/data/mining_disclosure_index.json"
      - "scripts/extract_10k_from_index.py"
      - ".github/workflows/extract-10k-from-index.yml"

concurrency:
  group: extract-10k-develop
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Debug index file
        run: |
          pwd
          ls -la public/data || true
          test -f public/data/mining_disclosure_index.json && echo "Index found"

      - name: Run extractor
        run: |
          python scripts/extract_10k_from_index.py

      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/data/tenk_extracted.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract: properties and ounces produced from disclosure index"
          git pull --rebase origin develop
          git push origin HEAD:develop
