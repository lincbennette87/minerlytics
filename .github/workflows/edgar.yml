name: EDGAR (Dev)

on:
  workflow_dispatch:

permissions:
  contents: write   # needed only if you want the workflow to commit/push results

jobs:
  run-edgar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      - name: Debug folders
        run: |
          ls -la
          ls -la data || true
          ls -la src || true
          ls -la src/edgar || true

      - name: Resolve CIK
        run: npm run edgar:resolve

      - name: Pull Submissions
        run: npm run edgar:submissions

      - name: Pull Facts
        run: npm run edgar:facts

      - name: Find TRS
        run: npm run edgar:trs

      # Optional: only keep this if your scripts write output files you want in the repo
      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Stage the files your pipeline actually generates
          git add data/universe.json public package-lock.json

          git status
          git commit -m "Dev: refresh EDGAR data" || echo "No changes to commit"
          git push
