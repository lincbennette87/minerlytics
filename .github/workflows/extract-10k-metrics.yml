name: Extract 10K Metrics

on:
  workflow_dispatch:
  push:
    paths:
      - "reports/*.pdf"
      - "scripts/extract_10k_metrics.py"
      - ".github/workflows/extract-10k-metrics.yml"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run extractor
        run: |
          python scripts/extract_10k_metrics.py

      - name: Commit extracted JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/data/tenk_extracted.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract: 10-K page 28 properties and page 44 production metrics"
          git push
