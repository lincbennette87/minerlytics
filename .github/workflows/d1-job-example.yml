name: D1 GitHub job write example

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: Sample ticker to store in the D1 payload.
        required: false
        default: AEM
      category:
        description: Sample category to store in the D1 payload.
        required: false
        default: gold
  schedule:
    - cron: "15 12 * * *"

permissions:
  contents: read

jobs:
  write-example:
    runs-on: ubuntu-latest
    env:
      CF_D1_DATABASE: minerlytics-dev
      SAMPLE_TICKER: ${{ inputs.ticker || 'AEM' }}
      SAMPLE_CATEGORY: ${{ inputs.category || 'gold' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wrangler
        run: npm install --no-save wrangler@latest

      - name: Build SQL payload for D1
        run: node scripts/d1_write_github_job_example.mjs .tmp/d1-github-job-example.sql

      - name: Write job output to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute "$CF_D1_DATABASE" --remote --file .tmp/d1-github-job-example.sql --yes
