name: YouTube transcript ingest (all symbols)

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install youtube-transcript-api requests

      - env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          WORKER_INGEST_URL: ${{ secrets.WORKER_INGEST_URL }}
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
        run: python scripts/youtube_discover_and_ingest.py
