name: Sync Company Homepages to Cloudflare D1

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional comma-separated tickers, e.g. AEM,WPM,PZG"
        required: false
        default: ""
      limit:
        description: "Optional maximum number of tickers to process"
        required: false
        default: ""
      delay:
        description: "Seconds to wait between search requests"
        required: false
        default: "1.0"
  schedule:
    - cron: "45 11 * * *"

permissions:
  contents: read

jobs:
  sync-homepages:
    runs-on: ubuntu-latest
    env:
      CF_D1_DATABASE: minerlytics-dev
      INPUT_SYMBOLS: ${{ inputs.symbols }}
      INPUT_LIMIT: ${{ inputs.limit }}
      INPUT_DELAY: ${{ inputs.delay || '1.0' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Wrangler
        run: npm install --no-save wrangler@latest

      - name: Generate homepage enrichment SQL
        run: |
          set -euo pipefail
          mkdir -p .tmp

          args=(
            --tickers-js src/tickers.js
            --schema-sql d1_company_homepages.sql
            --output-json .tmp/company-homepages.json
            --output-sql .tmp/company-homepages.sql
            --delay "${INPUT_DELAY:-1.0}"
          )
          symbol_args=()

          if [ -n "${INPUT_LIMIT:-}" ]; then
            args+=(--limit "$INPUT_LIMIT")
          fi

          if [ -n "${INPUT_SYMBOLS:-}" ]; then
            IFS=',' read -ra symbols <<< "$INPUT_SYMBOLS"
            for symbol in "${symbols[@]}"; do
              trimmed="$(echo "$symbol" | xargs)"
              if [ -n "$trimmed" ]; then
                symbol_args+=("$trimmed")
              fi
            done
          fi

          python scripts/sync_company_homepages.py "${args[@]}" "${symbol_args[@]}"

      - name: Write homepage results to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute "$CF_D1_DATABASE" --remote --file .tmp/company-homepages.sql --yes
