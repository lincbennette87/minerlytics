name: Extract 10K From SEC HTML

on:
  workflow_dispatch:
  push:
    paths:
      - "public/data/mining_disclosure_reports/*.json"
      - "scripts/extract_10k_from_sec_html.py"
      - ".github/workflows/extract-10k-from-sec-html.yml"

concurrency:
  group: extract-10k-develop
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug input files
        run: |
          pwd
          find public/data/mining_disclosure_reports -maxdepth 1 -type f | sort || true

      - name: Run extractor
        run: |
          python scripts/extract_10k_from_sec_html.py

      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/data/tenk_extracted.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract: properties and ounces produced from SEC HTML filings"

          git pull --rebase origin develop
          git push origin HEAD:develop
