name: Edgar Dev

on:
  workflow_dispatch:

jobs:
  run-edgar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci || npm install

      - name: Run EDGAR
        run: npm run edgar:all
