name: Run EDGAR Pipeline

on:
  workflow_dispatch:   # Adds the "Run workflow" button
  schedule:
    - cron: "15 6 * * *"  # Runs daily (optional)

jobs:
  edgar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run EDGAR scripts
        run: npm run edgar:all

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data config/universe.json
          git commit -m "Update EDGAR data" || echo "No changes"
          git push
