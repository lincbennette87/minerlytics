<!doctype html>
<html>
<head>
  <title>Minerlytics Payment</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logoMark" aria-hidden="true"></div>
      <span class="brandName">MINERLYTICS</span>
    </div>

    <nav class="navLinks" aria-label="Primary navigation">
      <a class="navLink" href="./index.html">Home</a>
      <a class="navLink" href="./company.html">Company Details</a>
      <a class="navLink" href="./analysis.html">Analysis</a>
      <a class="navLink" href="./educationportal.html">Education Portal</a>
      <a class="navLink" href="./subscription.html">Subscriptions</a>
      <a class="navLink" href="./about.html">About</a>
    </nav>

    <div class="navRight">
      <div id="authNav" style="display:flex;align-items:center;gap:10px;">
        <a class="btn btnGhost" href="./login.html">Sign In</a>
        <a class="btn btnPrimary" href="./signup.html">Join Minerlytics</a>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero" style="min-height:75vh;display:grid;place-items:center;">
      <div class="artCard" style="max-width:480px;width:100%;padding:32px;">
        <div style="margin-bottom:22px;">
          <div class="brandName" style="font-size:13px;color:#d7c09a;margin-bottom:8px;">MINERLYTICS CHECKOUT</div>
          <h1 style="font-size:36px;margin:0 0 10px;">Payment Details</h1>
          <p id="planText" class="subhead" style="font-size:15px;margin:0;"></p>
        </div>

        <form onsubmit="continueToSignup(event)" style="display:grid;gap:14px;">
          <input placeholder="Card Number" required style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;">
          <input placeholder="MM/YY" required style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;">
          <input placeholder="CVC" required style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;">
          <button class="btn btnPrimary" type="submit">Continue to Sign Up</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan") || "";
    document.getElementById("planText").textContent = "Selected plan: " + plan;

    function continueToSignup(e) {
      e.preventDefault();
      localStorage.setItem("minerlytics_payment_started", "true");
      window.location.href = "./signup.html?plan=" + encodeURIComponent(plan);
    }
  </script>
  <script src="./js/auth-ui.js"></script>
</body>
</html>
