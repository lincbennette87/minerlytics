<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password — Minerlytics</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logoMark" aria-hidden="true"></div>
      <span class="brandName">MINERLYTICS</span>
    </div>

    <nav class="navLinks">
      <a class="navLink" href="./index.html">Home</a>
      <a class="navLink" href="./company.html">Company Details</a>
      <a class="navLink" href="./analysis.html">Analysis</a>
      <a class="navLink" href="./educationportal.html">Education Portal</a>
      <a class="navLink" href="./subscription.html">Subscriptions</a>
      <a class="navLink" href="./about.html">About</a>
    </nav>

    <div class="navRight">
      <div id="authNav" style="display:flex;align-items:center;gap:10px;">
        <a class="btn btnGhost" href="./login.html">Sign In</a>
        <a class="btn btnPrimary" href="./signup.html">Join Minerlytics</a>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero" style="min-height:75vh;display:grid;place-items:center;">
      <div class="artCard" style="max-width:520px;width:100%;padding:32px;">
        <div style="margin-bottom:22px;">
          <div class="brandName" style="font-size:13px;color:#d7c09a;margin-bottom:8px;">MINERLYTICS ACCOUNT</div>
          <h1 style="font-size:36px;margin:0 0 10px;">Change Password</h1>
          <p class="subhead" id="accountEmail" style="font-size:15px;margin:0;">
            Checking your account session...
          </p>
        </div>

        <div style="display:grid;gap:14px;">
          <input id="currentPassword" type="password" placeholder="Current password"
            style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;" />

          <input id="newPassword" type="password" placeholder="New password"
            style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;" />

          <input id="confirmPassword" type="password" placeholder="Confirm new password"
            style="padding:14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;" />

          <button id="changePasswordBtn" class="btn btnPrimary" type="button">Update Password</button>

          <p id="msg" style="color:#d7c09a;font-size:13px;min-height:18px;"></p>

          <p style="font-size:13px;color:var(--muted);">
            Need to get back to research?
            <a href="./index.html" style="color:#d7c09a;">Return home</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/auth-ui.js"></script>
  <script>
    const API_BASE = "https://minerlytics-dev.lincbennette87.workers.dev";

    async function loadAccount() {
      const label = document.getElementById("accountEmail");
      const msg = document.getElementById("msg");

      try {
        const res = await fetch(API_BASE + "/api/me", {
          credentials: "include"
        });
        const data = await res.json();

        if (!data.loggedIn) {
          label.textContent = "You need to sign in before changing your password.";
          msg.textContent = "Redirecting to sign in...";
          setTimeout(() => {
            window.location.href = "./login.html";
          }, 1200);
          return;
        }

        label.textContent = "Signed in as " + (data.user.display_name || data.user.email);
        window.MinerlyticsAuthUI?.setUserCache(data.user);
      } catch (err) {
        console.error("ACCOUNT LOAD ERROR:", err);
        label.textContent = "Could not verify your session right now.";
        msg.textContent = "Please refresh and try again.";
      }
    }

    async function changePassword() {
      const msg = document.getElementById("msg");
      const btn = document.getElementById("changePasswordBtn");
      const currentPassword = document.getElementById("currentPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      msg.textContent = "Updating password...";
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + "/api/change-password", {
          method: "POST",
          headers: { "content-type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            currentPassword,
            newPassword,
            confirmPassword
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          msg.textContent = data?.error || `Could not update password (${res.status}).`;
          btn.disabled = false;
          return;
        }

        msg.textContent = "Password updated successfully.";
        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
        btn.disabled = false;
      } catch (err) {
        console.error("CHANGE PASSWORD ERROR:", err);
        msg.textContent = "Network/API error. Please try again.";
        btn.disabled = false;
      }
    }

    document.getElementById("changePasswordBtn").addEventListener("click", changePassword);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter") changePassword();
    });

    loadAccount();
  </script>
</body>
</html>
