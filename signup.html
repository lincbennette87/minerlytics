<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join Minerlytics</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logoMark" aria-hidden="true"></div>
      <span class="brandName">MINERLYTICS</span>
    </div>

    <nav class="navLinks">
      <a class="navLink" href="./index.html">Home</a>
      <a class="navLink" href="./analysis.html">Analysis</a>
      <a class="navLink" href="./educationportal.html">Education Portal</a>
      <a class="navLink" href="./subscription.html">Subscriptions</a>
      <a class="navLink" href="./about.html">About</a>
    </nav>
  </header>

  <main class="shell">
    <section class="hero" style="min-height:75vh;display:grid;place-items:center;">
      <div class="artCard" style="max-width:480px;width:100%;padding:32px;">
        <div style="margin-bottom:22px;">
          <div class="brandName" style="font-size:13px;color:#39e6c8;margin-bottom:8px;">MINERLYTICS ACCOUNT</div>
          <h1 style="font-size:36px;margin:0 0 10px;">Join Minerlytics</h1>
          <p class="subhead" style="font-size:15px;margin:0;">
            Create your account to save watchlists, research prompts, and personalized AI insights.
          </p>
        </div>

        <div style="display:grid;gap:14px;">
          <input id="email" type="email" placeholder="Email"
            style="padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#eaf0ff;outline:none;" />

          <input id="password" type="password" placeholder="Password"
            style="padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#eaf0ff;outline:none;" />

          <button class="btn btnPrimary" onclick="signup()">Create Account</button>

          <p id="msg" style="color:#ffcc66;font-size:13px;min-height:18px;"></p>

          <p style="font-size:13px;color:rgba(234,240,255,.7);">
            Already have an account?
            <a href="./login.html" style="color:#39e6c8;">Sign in</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script>
  const API_BASE = "https://minerlytics-dev.lincbennette87.workers.dev";

  async function signup() {
    const msg = document.getElementById("msg");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    msg.textContent = "Creating account...";

    try {
      const res = await fetch(API_BASE + "/api/signup", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json().catch(() => null);

      if (!res.ok || !data?.ok) {
        msg.textContent = data?.error || "Signup failed. Check Worker logs.";
        return;
      }

      msg.textContent = "Account created!";
      window.location.href = "./index.html";
    } catch (err) {
      msg.textContent = "Network/API error. Check Worker URL or CORS.";
      console.error(err);
    }
  }
  </script>
</body>

          <p id="msg" style="color:#ffcc66;font-size:13px;"></p>

          <p style="font-size:13px;color:rgba(234,240,255,.7);">
            Already have an account?
            <a href="./login.html" style="color:#39e6c8;">Sign in</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <script>
  async function signup() {
    const msg = document.getElementById("msg");
    msg.textContent = "Creating account...";

    const res = await fetch("/api/signup", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (!data.ok) {
      msg.textContent = data.error || "Signup failed";
      return;
    }

    window.location.href = "./index.html";
  }
  </script>
</body>
</html>
